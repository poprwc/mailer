services:
  # ── Web App ──
  - type: web
    name: campaign-mailer-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web.app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campaign-mailer-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CRON_TOKEN
        generateValue: true

  # ── Background Worker 24/7 ──
  - type: worker
    name: campaign-mailer-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python worker/worker.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campaign-mailer-db
          property: connectionString

databases:
  - name: campaign-mailer-db
    plan: free
