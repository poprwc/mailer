<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — Campaign Mailer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0f17;color:#dde2f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#151825;border:1px solid #2a2f45;border-radius:14px;padding:44px 40px;width:380px}
.logo{text-align:center;margin-bottom:24px}
h2{font-size:21px;font-weight:700;text-align:center;color:#fff;margin-top:14px}
.sub{text-align:center;color:#7880a0;font-size:13px;margin:6px 0 28px}
label{font-size:12px;color:#7880a0;margin-bottom:5px;display:block;font-weight:500}
input{width:100%;background:#1d2235;border:1px solid #2a2f45;border-radius:8px;color:#dde2f0;padding:11px 14px;font-size:14px;outline:none;margin-bottom:14px}
input:focus{border-color:#7c6fff}
.btn{width:100%;background:#7c6fff;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn:hover{background:#9d94ff}
.error{background:#450a0a;color:#fca5a5;border-radius:8px;padding:11px 14px;font-size:13px;margin-bottom:14px;border:1px solid #7f1d1d}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#7c6fff" stroke-width="1.5">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </svg>
  </div>
  <h2>Campaign Mailer</h2>
  <p class="sub">Sign in to your account</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" autofocus autocomplete="username">
    <label>Password</label>
    <input type="password" name="password" autocomplete="current-password">
    <button class="btn">Sign in</button>
  </form>
</div>
</body>
</html>
